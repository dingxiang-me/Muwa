name: Deploy Sparkle Appcast

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish (e.g. 0.19.13)"
        required: true
        type: string
      channel:
        description: "Sparkle channel"
        required: true
        default: release
        type: choice
        options:
          - release
          - beta

permissions:
  contents: read

jobs:
  deploy-appcast:
    # Sparkle's generate_appcast/sign_update binaries are macOS Mach-O; they
    # cannot run on ubuntu-latest (Exec format error / exit 126).
    runs-on: macos-26
    timeout-minutes: 10
    env:
      VERSION: ${{ inputs.version }}
      SPARKLE_CHANNEL: ${{ inputs.channel }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Generate and Deploy Sparkle Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PUBLIC_REPO: ${{ github.repository }}
        run: bash scripts/release/generate_and_deploy_appcast.sh
